name: Manual Build OneKVM ARM64 Deb

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如 4.94)'
        required: true
        default: '4.94'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build DEB in ARM64 Container
        run: |
          docker run --rm --privileged \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/src \
            -w /src \
            arm64v8/ubuntu:22.04 /bin/bash -ce "
              # 1. 环境准备
              apt-get update
              apt-get install -y python3 python3-pip python3-venv ruby ruby-dev rubygems build-essential
              gem install --no-document fpm
              
              # 2. 模拟生产路径构建 (将源码同步到 /opt/onekvm)
              mkdir -p /opt/onekvm
              cp -r /src/. /opt/onekvm/
              
              # 3. 准备虚拟环境并安装
              python3 -m venv /opt/onekvm/venv
              /opt/onekvm/venv/bin/pip install --upgrade pip
              /opt/onekvm/venv/bin/pip install /opt/onekvm/
              
              # 4. 智能处理 Service 和配置文件 (修正路径逻辑)
              SERVICE_ARGS=''
              EXTRA_FILES_ARGS=''
              # 注意：这里使用 /src 路径下的文件进行逻辑判断，因为它们是持久化的
              SERVICE_DIR='/src/configs/os/services'
              
              if [ -d \"\$SERVICE_DIR\" ]; then
                for f in \$SERVICE_DIR/*; do
                  # 获取文件名，用于后续拼接
                  fname=\$(basename \"\$f\")
                  if [[ \"\$fname\" == *.service ]] || [[ \"\$fname\" == *.timer ]]; then
                    # fpm 的 --deb-systemd 需要容器内的实际物理路径
                    SERVICE_ARGS=\"\$SERVICE_ARGS --deb-systemd \$f\"
                  elif [[ \"\$fname\" == *.d ]]; then
                    # 映射：源路径=安装目标路径
                    EXTRA_FILES_ARGS=\"\$EXTRA_FILES_ARGS \$f=/lib/systemd/system/\$fname\"
                  fi
                done
              fi

              # 5. 执行打包
              # -C 指定为 /opt/onekvm，意味着打包该目录下的所有内容
              # '.' 表示打包 -C 路径下的所有文件，并附加到 --prefix 指定的 /opt/onekvm
              fpm -s dir -t deb \
                  -n onekvm \
                  -v '${{ github.event.inputs.version }}' \
                  -a arm64 \
                  -d 'python3' \
                  \$SERVICE_ARGS \
                  --prefix /opt/onekvm \
                  -C /opt/onekvm . \
                  \$EXTRA_FILES_ARGS \
                  -p /src/onekvm_${{ github.event.inputs.version }}_arm64.deb
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          files: "*.deb"
          body: |
            ## OneKVM (PiKVM Python) ARM64 Build
            - **Version:** ${{ github.event.inputs.version }}
            - **Architecture:** ARM64
            - **Contents:** All kvmd services and .d configuration directories.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
