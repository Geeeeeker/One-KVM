name: Manual Build OneKVM ARM64 Deb

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如 4.94)'
        required: true
        default: '4.94'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build DEB in ARM64 Container
        run: |
          docker run --rm --privileged \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/src \
            -w /src \
            arm64v8/ubuntu:22.04 /bin/bash -ce "
              # 1. 环境准备
              apt-get update
              apt-get install -y python3 python3-pip python3-venv ruby ruby-dev rubygems build-essential
              gem install --no-document fpm
              
              # 2. 准备构建根目录 (Staging Directory)
              # 我们将所有要打包到 /opt/onekvm 的内容放入此目录
              BUILD_ROOT='/tmp/build_root'
              mkdir -p \$BUILD_ROOT/opt/onekvm
              
              # 复制源码并安装环境
              cp -r /src/. \$BUILD_ROOT/opt/onekvm/
              python3 -m venv \$BUILD_ROOT/opt/onekvm/venv
              \$BUILD_ROOT/opt/onekvm/venv/bin/pip install --upgrade pip
              \$BUILD_ROOT/opt/onekvm/venv/bin/pip install \$BUILD_ROOT/opt/onekvm/
              
              # 3. 处理 Systemd Service 和 .d 目录
              SERVICE_ARGS=''
              SERVICE_SRC='/src/configs/os/services'
              
              if [ -d \"\$SERVICE_SRC\" ]; then
                for f in \$SERVICE_SRC/*; do
                  fname=\$(basename \"\$f\")
                  if [[ \"\$fname\" == *.service ]] || [[ \"\$fname\" == *.timer ]]; then
                    # fpm 的 --deb-systemd 需要容器内文件的绝对路径
                    SERVICE_ARGS=\"\$SERVICE_ARGS --deb-systemd \$f\"
                  elif [[ \"\$fname\" == *.d ]]; then
                    # 将 .d 目录复制到 BUILD_ROOT 对应的系统路径下
                    mkdir -p \"\$BUILD_ROOT/lib/systemd/system/\"
                    cp -r \"\$f\" \"\$BUILD_ROOT/lib/systemd/system/\"
                  fi
                done
              fi

              # 4. 执行打包
              # 将 -p 等参数放在前面，-C 放在后面，最后接 '.'
              fpm -s dir -t deb \
                  -n onekvm \
                  -v '${{ github.event.inputs.version }}' \
                  -a arm64 \
                  -p /src/onekvm_${{ github.event.inputs.version }}_arm64.deb \
                  -d 'python3' \
                  \$SERVICE_ARGS \
                  -C \$BUILD_ROOT .
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          files: "*.deb"
          body: |
            ## OneKVM (PiKVM Python) ARM64 Build
            - **Version:** ${{ github.event.inputs.version }}
            - **Architecture:** ARM64
            - **Contents:** Includes venv, services, and systemd drop-in configs.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
