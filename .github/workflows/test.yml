name: Manual Build OneKVM ARM64 Deb

on:
  workflow_dispatch: # 开启手动触发界面
    inputs:
      version:
        description: '版本号 (例如 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build and Package
        run: |
          # 启动 ARM64 容器并在内部执行构建
          docker run --rm --privileged -v ${{ github.workspace }}:/src -w /src arm64v8/ubuntu:22.04 /bin/bash -c "
            apt-get update && apt-get install -y python3 python3-pip python3-venv ruby ruby-dev rubygems build-essential
            gem install --no-document fpm
            
            # 1. 在最终安装路径 /opt/onekvm 下构建虚拟环境，防止路径硬编码错误
            mkdir -p /opt/onekvm
            cp -r . /opt/onekvm/
            python3 -m venv /opt/onekvm/venv
            /opt/onekvm/venv/bin/pip install --upgrade pip
            /opt/onekvm/venv/bin/pip install /opt/onekvm/
            
            # 2. 使用 FPM 打包
            # --deb-systemd 会自动将 service 文件放入 /lib/systemd/system/
            fpm -s dir -t deb \
                -n onekvm \
                -v ${{ github.event.inputs.version }} \
                -a arm64 \
                -d 'python3' \
                --deb-systemd onekvm.service \
                --prefix /opt/onekvm \
                -C /opt/onekvm .
            
            # 3. 将生成的 deb 移动回挂载目录
            mv *.deb /src/
          "

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          files: "*.deb"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
