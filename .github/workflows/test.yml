name: Manual Build OneKVM ARM64 Deb

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build DEB in ARM64 Container
        run: |
          docker run --rm --privileged \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/src \
            -w /src \
            arm64v8/ubuntu:22.04 /bin/bash -c "
              set -e
              
              # 1. 修正后的换源命令 (使用 # 作为分隔符)
              sed -i 's#http://ubuntu.com' /etc/apt/sources.list
              
              apt-get update && apt-get install -y python3 python3-pip python3-venv ruby ruby-dev rubygems build-essential
              
              # 2. 安装打包工具 FPM
              gem install --no-document fpm
              
              # 3. 准备构建目录
              mkdir -p /opt/onekvm
              cp -r . /opt/onekvm/
              
              # 4. 构建 Python 虚拟环境 (确保在目标路径 /opt/onekvm 构建)
              python3 -m venv /opt/onekvm/venv
              /opt/onekvm/venv/bin/pip install --upgrade pip
              
              # 检查并安装项目依赖
              if [ -f '/opt/onekvm/setup.py' ] || [ -f '/opt/onekvm/pyproject.toml' ]; then
                /opt/onekvm/venv/bin/pip install /opt/onekvm/
              fi
              
              # 5. 执行 FPM 打包
              # --deb-systemd 会自动安装 onekvm.service 到 /lib/systemd/system/
              fpm -s dir -t deb \
                  -n onekvm \
                  -v ${{ github.event.inputs.version }} \
                  -a arm64 \
                  -d 'python3' \
                  --deb-systemd onekvm.service \
                  --prefix /opt/onekvm \
                  -C /opt/onekvm .
              
              # 6. 将生成的 deb 移动到挂载目录
              mv *.deb /src/
          "

      - name: Check Artifacts
        run: ls -lh *.deb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          files: "*.deb"
          body: |
            ## OneKVM ARM64 Build
            - **Version:** ${{ github.event.inputs.version }}
            - **Architecture:** ARM64 (Ubuntu 22.04+)
            - **Service:** `sudo systemctl enable --now onekvm`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
