name: Manual Build OneKVM ARM64 Deb

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限才能创建 Release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build DEB in ARM64 Container
        run: |
          # 使用 --platform linux/arm64 强制在模拟环境下运行
          docker run --rm --privileged \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/src \
            -w /src \
            arm64v8/ubuntu:22.04 /bin/bash -c "
              set -e
              # 1. 换源并安装基础工具 (加速构建)
              sed -i 's/://ubuntu.com' /etc/apt/sources.list
              apt-get update && apt-get install -y python3 python3-pip python3-venv ruby ruby-dev rubygems build-essential
              
              # 2. 安装打包工具 FPM
              gem install --no-document fpm
              
              # 3. 模拟生产环境路径构建 (关键：防止 venv 路径硬编码错误)
              mkdir -p /opt/onekvm
              cp -r . /opt/onekvm/
              
              python3 -m venv /opt/onekvm/venv
              /opt/onekvm/venv/bin/pip install --upgrade pip
              # 安装当前项目及其依赖
              if [ -f '/opt/onekvm/setup.py' ] || [ -f '/opt/onekvm/pyproject.toml' ]; then
                /opt/onekvm/venv/bin/pip install /opt/onekvm/
              fi
              
              # 4. 执行 FPM 打包
              # --deb-systemd 自动处理服务挂载和 daemon-reload
              # --prefix 指定安装后的根目录
              fpm -s dir -t deb \
                  -n onekvm \
                  -v ${{ github.event.inputs.version }} \
                  -a arm64 \
                  -d 'python3' \
                  --deb-systemd onekvm.service \
                  --prefix /opt/onekvm \
                  -C /opt/onekvm .
              
              # 5. 将成品移回挂载目录供宿主机读取
              mv *.deb /src/
          "

      - name: Check Artifacts
        run: ls -lh *.deb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          files: "*.deb"
          body: |
            ## OneKVM ARM64 Build
            - **Version:** ${{ github.event.inputs.version }}
            - **Architecture:** ARM64 (Ubuntu 22.04+)
            - **Installation:** `sudo dpkg -i <filename>.deb`
            - **Service:** `sudo systemctl enable --now onekvm`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
