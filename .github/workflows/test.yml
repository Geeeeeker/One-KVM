name: Manual Build OneKVM ARM64 Deb

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如 4.94)'
        required: true
        default: '4.94'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build DEB in ARM64 Container
        run: |
          docker run --rm --privileged \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/src \
            -w /src \
            arm64v8/ubuntu:22.04 /bin/bash -ce "
              # 1. 环境准备
              apt-get update
              apt-get install -y python3 python3-pip python3-venv ruby ruby-dev rubygems build-essential
              gem install --no-document fpm
              
              # 2. 模拟生产路径构建 (防止 venv 路径失效)
              mkdir -p /opt/onekvm
              cp -r /src/. /opt/onekvm/
              
              python3 -m venv /opt/onekvm/venv
              /opt/onekvm/venv/bin/pip install --upgrade pip
              /opt/onekvm/venv/bin/pip install /opt/onekvm/

              # 3. 动态获取所有 Systemd 服务文件
              # 遍历 configs/os/services/ 下所有的 .service, .timer, .d 目录
              SERVICE_ARGS=''
              SERVICE_DIR='/opt/onekvm/configs/os/services'
              if [ -d \"\$SERVICE_DIR\" ]; then
                for f in \$SERVICE_DIR/*; do
                  SERVICE_ARGS=\"\$SERVICE_ARGS --deb-systemd \$f\"
                done
              fi

              # 4. 执行打包 (输出到 /tmp 避免 mv 冲突)
              fpm -s dir -t deb \
                  -n onekvm \
                  -v '${{ github.event.inputs.version }}' \
                  -a arm64 \
                  -d 'python3' \
                  \$SERVICE_ARGS \
                  --prefix /opt/onekvm \
                  -p /tmp/onekvm_${{ github.event.inputs.version }}_arm64.deb \
                  -C /opt/onekvm .
              
              # 5. 移回挂载目录
              mv /tmp/*.deb /src/
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          files: "*.deb"
          body: |
            ## OneKVM (PiKVM Python) ARM64
            - **Version:** ${{ github.event.inputs.version }}
            - **Base Image:** Ubuntu 22.04
            - **Services included:** Multiple kvmd-*.service files from configs.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
