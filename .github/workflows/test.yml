name: Manual Build OneKVM ARM64 Deb

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如 4.94)'
        required: true
        default: '4.94'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build DEB in ARM64 Container
        run: |
          docker run --rm --privileged \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/src \
            -w /src \
            arm64v8/ubuntu:22.04 /bin/bash -ce "
              # 1. 环境准备
              apt-get update
              apt-get install -y python3 python3-pip python3-venv ruby ruby-dev rubygems build-essential
              gem install --no-document fpm
              
              # 2. 模拟生产路径构建
              mkdir -p /opt/onekvm
              cp -r /src/. /opt/onekvm/
              
              python3 -m venv /opt/onekvm/venv
              /opt/onekvm/venv/bin/pip install --upgrade pip
              /opt/onekvm/venv/bin/pip install /opt/onekvm/

              # 3. 智能处理 Service 和配置文件
              # 分离 .service/.timer (使用 --deb-systemd) 和 .d 目录 (直接映射路径)
              SERVICE_ARGS=''
              EXTRA_FILES_ARGS=''
              SERVICE_DIR='/opt/onekvm/configs/os/services'
              
              if [ -d \"\$SERVICE_DIR\" ]; then
                for f in \$SERVICE_DIR/*; do
                  if [[ \"\$f\" == *.service ]] || [[ \"\$f\" == *.timer ]]; then
                    SERVICE_ARGS=\"\$SERVICE_ARGS --deb-systemd \$f\"
                  elif [[ \"\$f\" == *.d ]]; then
                    # 获取文件夹名称并映射到系统的 systemd 目录
                    dirname=\$(basename \"\$f\")
                    EXTRA_FILES_ARGS=\"\$EXTRA_FILES_ARGS \$f=/lib/systemd/system/\$dirname\"
                  fi
                done
              fi

              # 4. 执行打包
              # 注意：这里增加了 EXTRA_FILES_ARGS 来处理 .d 目录
              fpm -s dir -t deb \
                  -n onekvm \
                  -v '${{ github.event.inputs.version }}' \
                  -a arm64 \
                  -d 'python3' \
                  \$SERVICE_ARGS \
                  --prefix /opt/onekvm \
                  -p /tmp/onekvm_${{ github.event.inputs.version }}_arm64.deb \
                  -C /opt/onekvm . \
                  \$EXTRA_FILES_ARGS
              
              # 5. 移回挂载目录
              mv /tmp/*.deb /src/
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          files: "*.deb"
          body: |
            ## OneKVM (PiKVM Python) ARM64 Build
            - **Version:** ${{ github.event.inputs.version }}
            - **Architecture:** ARM64
            - **Contents:** All kvmd services and .d configuration directories.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
