name: Build amd64 .deb

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-amd64:
    name: Build amd64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libudev-dev libssl-dev \
            libasound2-dev libdrm-dev libva-dev libmfx-dev \
            libx11-dev libxcb1-dev libjpeg-turbo8-dev libopus-dev \
            libv4l-dev libyuv-dev libavcodec-dev libavutil-dev \
            nasm

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-unknown-linux-gnu
          override: true
          profile: minimal

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: amd64-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Build binary
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Package .deb
        run: |
          chmod +x ./build/build-deb.sh
          ./build/build-deb.sh amd64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-kvm-amd64
          path: target/debian/one-kvm_*.deb

  release:
    name: Create Release
    needs: build-amd64
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Determine tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: one-kvm-amd64
          path: artifacts

      - name: Create Release and upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: artifacts/*.deb
          generate_release_notes: true
