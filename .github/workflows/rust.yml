name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (optional, will create release if provided)'
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build for ${{ matrix.arch }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            rust_target: x86_64-unknown-linux-gnu
            deb_arch: amd64
            use_cross: false
          - arch: i386
            rust_target: i686-unknown-linux-gnu
            deb_arch: i386
            use_cross: true
          - arch: arm64
            rust_target: aarch64-unknown-linux-gnu
            deb_arch: arm64
            use_cross: true
          - arch: armhf
            rust_target: armv7-unknown-linux-gnueabihf
            deb_arch: armhf
            use_cross: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cross
        if: matrix.use_cross == true
        run: |
          curl -L https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar xzf -
          sudo mv cross /usr/local/bin/

      - name: Install system dependencies (native amd64)
        if: matrix.use_cross == false
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libudev-dev \
            libssl-dev \
            libasound2-dev \
            libdrm-dev \
            libva-dev \
            libmfx-dev \
            libx11-dev \
            libxcb1-dev \
            libjpeg-turbo8-dev \
            libopus-dev \
            libv4l-dev \
            libyuv-dev \
            libavcodec-dev \
            libavutil-dev \
            nasm

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.rust_target }}
          override: true
          profile: minimal

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Build binary (native)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.rust_target }}

      - name: Build binary with cross
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.rust_target }}

      - name: Package .deb
        run: |
          chmod +x ./build/build-deb.sh
          ./build/build-deb.sh ${{ matrix.deb_arch }}
        env:
          CARGO_TARGET_DIR: target

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-kvm-${{ matrix.deb_arch }}
          path: target/debian/one-kvm_*.deb

  release:
    name: Create Release and Upload Assets
    needs: build
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_tag != ''
    steps:
      - name: Determine release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG="${{ github.event.inputs.release_tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release and upload .deb files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          files: artifacts/**/*.deb
          generate_release_notes: true
          draft: false
          prerelease: false
